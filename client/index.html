<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>monster-realm</title>
  </head>
  <body style="margin: 0; background: #0b0d12">
    <div id="app"></div>
    <!-- M12d overlay shells — hidden by default; managed by JS views (ADR-0071). -->
    <div id="dialogue-overlay" style="display:none">
      <div id="dialogue-npc-name"></div>
      <div id="dialogue-node-text"></div>
      <div id="dialogue-choices"></div>
    </div>
    <div id="quest-log-overlay" style="display:none">
      <ul id="quest-log-list"></ul>
    </div>
    <div id="heal-overlay" style="display:none">
      <ul id="heal-list"></ul>
    </div>
    <!-- M13d shop overlay shell — hidden by default; managed by ShopView (ADR-0084). -->
    <div id="shop-overlay" style="display:none">
      <div id="shop-title"></div>
      <ul id="shop-for-sale"></ul>
      <ul id="shop-inventory"></ul>
      <div id="shop-feedback"></div>
    </div>
    <!-- m15b trade overlay shell — hidden by default; managed by TradeView (ADR-0107). -->
    <div id="trade-overlay" style="display:none">
      <div id="trade-status"></div>
      <div id="trade-my-side"></div>
      <div id="trade-their-side"></div>
      <div id="trade-actions"></div>
      <div id="trade-feedback"></div>
    </div>
    <!-- m16b PvP challenge overlay shell — hidden by default; managed by PvpView (ADR-0110). -->
    <div id="pvp-challenge-overlay" style="display:none">
      <div id="pvp-challenge-status"></div>
      <div id="pvp-challenge-incoming"></div>
      <div id="pvp-challenge-outgoing"></div>
      <ul id="pvp-player-list"></ul>
      <div id="pvp-challenge-feedback"></div>
    </div>
    <!-- m17b leaderboard overlay shell — hidden by default; managed by LeaderboardView (ADR-0120). -->
    <div id="leaderboard-overlay" style="display:none">
      <div id="leaderboard-title"></div>
      <ul id="leaderboard-list"></ul>
    </div>
    <!-- pt-c1b rename overlay shell — hidden by default; managed by RenameView (ADR-0133). -->
    <div id="rename-overlay" style="display:none">
      <div id="rename-current" data-testid="rename-current"></div>
      <input id="rename-input" data-testid="rename-input" type="text" maxlength="24" />
      <button id="rename-submit" data-testid="rename-submit" type="button">Rename</button>
      <div id="rename-feedback" data-testid="rename-feedback"></div>
    </div>
    <!-- pt-a1 (ADR-0128): build-provenance stamp — populated by main.ts from BUILD_INFO
         (git sha + build time + mode). Non-intrusive; pins which build a playtest finding
         came from. Present in production (unlike the DEV-gated debug hooks). -->
    <div
      id="build-stamp"
      style="position:fixed;bottom:2px;right:4px;font:10px/1.2 monospace;color:#667;opacity:0.55;pointer-events:none;z-index:9999"
    ></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
