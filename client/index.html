<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>monster-realm</title>
  </head>
  <body style="margin: 0; background: #0b0d12">
    <div id="app"></div>
    <!-- M12d overlay shells — hidden by default; managed by JS views (ADR-0071). -->
    <div id="dialogue-overlay" style="display:none">
      <div id="dialogue-npc-name"></div>
      <div id="dialogue-node-text"></div>
      <div id="dialogue-choices"></div>
    </div>
    <div id="quest-log-overlay" style="display:none">
      <ul id="quest-log-list"></ul>
    </div>
    <div id="heal-overlay" style="display:none">
      <ul id="heal-list"></ul>
    </div>
    <!-- M13d shop overlay shell — hidden by default; managed by ShopView (ADR-0084). -->
    <div id="shop-overlay" style="display:none">
      <div id="shop-title"></div>
      <ul id="shop-for-sale"></ul>
      <ul id="shop-inventory"></ul>
      <div id="shop-feedback"></div>
    </div>
    <!-- m15b trade overlay shell — hidden by default; managed by TradeView (ADR-0107). -->
    <div id="trade-overlay" style="display:none">
      <div id="trade-status"></div>
      <div id="trade-my-side"></div>
      <div id="trade-their-side"></div>
      <div id="trade-actions"></div>
      <div id="trade-feedback"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
