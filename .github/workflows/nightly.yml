# Nightly mutation + coverage gates (ADR-0050). These are slow / informational
# gates kept OFF the per-PR path so `just ci` stays the fast inner loop
# (ADR-0043). They run on a schedule and on manual dispatch only.
#
# NOTE: action major versions are pinned here (e.g. @v4) to match ci.yml's
# style; M8.5d SHA-pins all workflow actions (this file included). There is
# deliberately NO `continue-on-error` on the threshold steps — a soft failure
# would make these gates toothless.
name: Nightly
on:
  schedule:
    # 07:00 UTC daily.
    - cron: '0 7 * * *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  # cargo-mutants scoped to the rule core (game-core). Surviving mutants fail
  # the job (default cargo-mutants behavior); policy in ADR-0050.
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      # Distinct prefix-key (v1-nightly) so this cache never collides with the
      # ci (v1-ci) / e2e (v1-e2e) job caches.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { prefix-key: v1-nightly }
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2
        with: { tool: cargo-mutants }
      # `just mutate-core` shells out through `just`; without this the step dies
      # with `just: command not found` (exit 127). Same SHA-pin as ci.yml + the
      # coverage job below. cargo-mutants policy is unchanged (ADR-0050).
      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
      - run: just mutate-core

  # vitest line-coverage threshold (vitest exits non-zero below the threshold).
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.13.1'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
      - run: just coverage

  # Publish → edit-content → republish-WITHOUT-delete-data → sync_content →
  # assert data survives + new content version served (spec §12.5b-6, ADR-0079).
  # Failure policy: any failure is inserted as the NEXT slice in the milestone
  # queue (priority: same tier as fix-red-master, below it in ordering).
  # Uses an isolated per-run DB name so concurrent nightly runs don't collide.
  smoke-republish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with: { targets: wasm32-unknown-unknown }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { prefix-key: v1-smoke }
      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
      - name: Install SpacetimeDB CLI
        # Download-then-execute (not `curl | sh`): satisfies semgrep
        # gha-curl-pipe-shell and leaves an artifact for inspection.
        # `--yes`: installer prompts to confirm on a non-tty runner without it.
        run: |
          curl -sSf -o /tmp/spacetime-install.sh https://install.spacetimedb.com
          sh /tmp/spacetime-install.sh --yes
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Pin spacetime 2.6.0
        run: |
          spacetime version install 2.6.0
          spacetime version use 2.6.0
          spacetime --version
      # Ephemeral in-memory SpacetimeDB instance on 127.0.0.1:3000.
      - name: Start SpacetimeDB
        run: nohup spacetime start --in-memory --listen-addr 127.0.0.1:3000 > /tmp/stdb-smoke.log 2>&1 &
      - name: Wait for SpacetimeDB
        run: |
          for i in $(seq 1 60); do
            if curl -s -o /dev/null http://127.0.0.1:3000/; then echo "ready after ${i}s"; exit 0; fi
            sleep 1
          done
          echo "spacetime did not become ready on :3000" >&2
          cat /tmp/stdb-smoke.log >&2 || true
          exit 1
      - name: Run smoke-republish test
        env:
          STDB_SERVER: http://127.0.0.1:3000
          # Per-run isolated DB name: never collides with concurrent nightly runs
          # or the regular monster-realm dev/e2e database.
          MR_SMOKE_DB: monster-realm-smoke-${{ github.run_id }}
        run: just smoke-republish
      - name: Dump SpacetimeDB logs on failure
        if: failure()
        run: cat /tmp/stdb-smoke.log || true
